<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequency 2026 — Event Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#041271;--navy2:#071a8a;--navy-light:#0c2394;
  --gold:#FFBD00;--gold2:#e6aa00;
  --blue:#0377BE;
  --bg:#f1f7fc;--surface:#fff;--surface2:#e8f0f8;
  --border:#d0dcea;--text:#0d1b4a;--muted:#5a6a8a;
  --green:#16a34a;--red:#dc2626;
  font-family:'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh}

/* GATE */
#gate{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:url('https://cdn.prod.website-files.com/5e3277d251fd9e4b90615367/68b7cb6e279a624b0787dba2_4ab2bd3545f7678c8f9a02ccccfc0f79_event-bg.jpg') center/cover no-repeat;
  position:relative;
}
#gate::before{content:'';position:absolute;inset:0;background:rgba(4,18,113,0.82);}
.gate-card{
  position:relative;z-index:1;background:rgba(255,255,255,0.97);
  border-radius:20px;padding:44px 52px;width:100%;max-width:440px;
  text-align:center;box-shadow:0 32px 80px rgba(4,18,113,0.35);
}
.gate-logo-wrap{margin:0 auto 24px;}
.gate-logo-wrap img{height:44px;}
.gate-card h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px}
.gate-card p{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.6}
.gate-input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 16px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;
  font-family:'Poppins',sans-serif;transition:border-color .15s;
}
.gate-input:focus{border-color:var(--blue)}
.gate-input.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.gate-btn{
  width:100%;background:var(--navy);border:none;border-radius:10px;
  padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:background .15s;
}
.gate-btn:hover{background:var(--navy2)}
.gate-btn:disabled{opacity:.5;cursor:not-allowed}
.gate-error{color:var(--red);font-size:12px;margin-top:10px;min-height:18px}
.gate-step{display:none}.gate-step.active{display:block}
.email-confirm{
  background:var(--surface2);border-radius:8px;padding:8px 14px;
  font-size:13px;color:var(--navy);margin-bottom:14px;font-weight:500;
}

/* APP */
#app{display:none;flex-direction:column;height:100vh}
.header{
  background:var(--navy);
  background-image:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  border-bottom:3px solid var(--gold);
  padding:0 24px;height:64px;
  display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.header-logo{height:30px;}
.header-divider{width:1px;height:30px;background:rgba(255,255,255,0.2);}
.header-title{color:#fff;font-size:15px;font-weight:600;line-height:1.2}
.header-sub{color:rgba(255,255,255,0.55);font-size:11px;font-weight:400}
.header-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.user-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:4px 12px;font-size:12px;color:rgba(255,255,255,0.75)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.2);border-radius:8px;
  padding:5px 12px;color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;
  font-family:'Poppins',sans-serif}
.logout-btn:hover{border-color:rgba(255,255,255,0.6);color:#fff}

/* CHAT */
.chat-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:720px;display:flex;flex-direction:column;gap:4px}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.bubble{
  padding:12px 18px;border-radius:18px;font-size:14px;line-height:1.7;
  max-width:100%;
}
.msg.user .bubble{
  background:var(--navy);color:#fff;border-bottom-right-radius:4px;
}
.msg.bot .bubble{
  background:#fff;border:1px solid var(--border);color:var(--text);
  border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(4,18,113,0.06);
}
.msg.bot .bubble b{color:var(--navy)}
.msg-time{font-size:10px;color:var(--muted);padding:0 4px}

/* CHIPS */
.chips-row{
  padding:10px 24px 0;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;
}
.chip{
  background:#fff;border:1.5px solid var(--border);border-radius:20px;
  padding:6px 14px;font-size:12px;color:var(--navy);cursor:pointer;
  transition:all .15s;font-family:'Poppins',sans-serif;font-weight:500;
}
.chip:hover{background:var(--navy);border-color:var(--navy);color:#fff}

/* INPUT BAR */
.input-bar{
  padding:16px 24px;background:#fff;border-top:1px solid var(--border);flex-shrink:0;
}
.input-row{display:flex;gap:10px;align-items:center}
.chat-input{
  flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 16px;color:var(--text);font-size:14px;outline:none;
  font-family:'Poppins',sans-serif;transition:border-color .15s;
  resize:none;line-height:1.5;
}
.chat-input:focus{border-color:var(--navy);background:#fff}
.chat-input::placeholder{color:var(--muted)}
.send-btn{
  background:var(--navy);border:none;border-radius:12px;
  width:46px;height:46px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background .15s;
}
.send-btn:hover{background:var(--navy2)}
.send-btn svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.typing{display:flex;gap:5px;align-items:center;padding:14px 18px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chips-row{padding:10px 24px 0;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;max-height:90px;overflow-y:auto;}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo-wrap">
      <img src="https://cdn.prod.website-files.com/5e3277d251fd9e4b90615367/67fe2ee20de5d96a7498ca78_Celona_Frequency_Horizontal_RGB_Reverse.svg" alt="Frequency 2026">
    </div>

</div>

<!-- APP -->
<div id="app">

    <img src="https://cdn.prod.website-files.com/5e3277d251fd9e4b90615367/67fe2ee20de5d96a7498ca78_Celona_Frequency_Horizontal_RGB_Reverse.svg" class="header-logo" alt="Frequency 2026">

<script>
const PWD_HASH='d1fabd979b5b9f06c5958fc0201e5919b5affd159fc8db400c6701dce71aa654';
const NTFY_TOPIC='freq2026-logins-pradhyum';
const SESSION_KEY='freq26_v3';
const SESSION_HOURS=24;

async function sha256(m){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function saveSession(email){localStorage.setItem(SESSION_KEY,JSON.stringify({email,expires:Date.now()+SESSION_HOURS*3600000}));}
function getSession(){try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'{}');if(s.email&&s.expires>Date.now())return s;}catch(e){}return null;}
function clearSession(){localStorage.removeItem(SESSION_KEY);}

async function logLogin(email){
  const now=new Date().toLocaleString('en-US',{timeZone:'America/Los_Angeles',dateStyle:'medium',timeStyle:'short'});
  try{fetch('https://ntfy.sh/'+NTFY_TOPIC,{method:'POST',body:email+' accessed the Frequency 2026 portal\n'+now+' PT',headers:{'Title':'Freq2026 Portal Login','Priority':'low','Tags':'key'}});}catch(e){}
}

function nextStep(){
  const email=document.getElementById('emailInput').value.trim();
  if(!email||!email.includes('@')){
    document.getElementById('emailError').textContent='Please enter a valid email address.';
    const inp=document.getElementById('emailInput');inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);return;
  }
  document.getElementById('emailError').textContent='';
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  document.getElementById('emailDisplay').textContent='🔒 '+email;
  document.getElementById('pwdInput').focus();
}

async function checkPwd(){
  const btn=document.getElementById('pwdBtn');
  btn.disabled=true;btn.textContent='Verifying…';
  const hash=await sha256(document.getElementById('pwdInput').value);
  if(hash===PWD_HASH){
    const email=document.getElementById('emailInput').value.trim();
    saveSession(email);logLogin(email);showApp(email);
  }else{
    btn.disabled=false;btn.textContent='Access Portal';
    document.getElementById('pwdError').textContent='Incorrect password. Please try again.';
    const inp=document.getElementById('pwdInput');inp.value='';inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);
  }
}

function showApp(email){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('userPill').textContent=email;
  addBotMsg("Hi! I'm your Frequency 2026 assistant. Ask me anything about the event — attendees, speakers, hotel reservations, sponsors, food preferences, and more.");
}

function logout(){clearSession();location.reload();}

window.addEventListener('DOMContentLoaded',()=>{
  const s=getSession();
  if(s)showApp(s.email);
  else{
    document.getElementById('emailInput').focus();
    document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')nextStep();});
  }
});

const attendees=DATA['Attendee list'].records;

const yes=v=>v==='Y'||v==='y'||v==='Yes'||v==='YES';
const isYes=(r,k)=>yes(r[k]);

function fmt(items,fn){return items.map((r,i)=>'• '+fn(r)).join('<br>');}

function answer(query){
  const q=query.toLowerCase().trim();
  let a='';

  // ── Help / query reference ──
  if(q.includes('help')||q.includes('what can')||q.includes('all quer')||q.includes('show quer')){
    a=`<b>📋 Everything you can ask:</b><br><br>
<b>🎤 Speakers</b><br>&nbsp;&nbsp;• "Who are the speakers?"<br>&nbsp;&nbsp;• "speakers for [topic]"<br><br>
<b>✅ Confirmed attendees</b><br>&nbsp;&nbsp;• "Who confirmed attendance?"<br>&nbsp;&nbsp;• "Who confirmed from [company]?"<br><br>
<b>🏢 Companies</b><br>&nbsp;&nbsp;• "Which companies are attending?"<br>&nbsp;&nbsp;• "companies from [account type, e.g. Customers]"<br><br>
<b>👤 Account owners</b><br>&nbsp;&nbsp;• "Who are the account owners?"<br>&nbsp;&nbsp;• "account owner for [name or company]"<br><br>
<b>🏨 Hotel</b><br>&nbsp;&nbsp;• "Who is staying at the hotel?"<br>&nbsp;&nbsp;• "hotel for [name]"<br><br>
<b>⭐ CAB members</b><br>&nbsp;&nbsp;• "Who are the CAB members?"<br><br>
<b>💼 Sponsors</b><br>&nbsp;&nbsp;• "Show me the sponsors"<br><br>
<b>🍽️ Food preferences</b><br>&nbsp;&nbsp;• "What are the food preferences?"<br>&nbsp;&nbsp;• "who wants chicken / vegetarian / beef"<br><br>
<b>❌ Cancelled</b><br>&nbsp;&nbsp;• "Who cancelled?"<br><br>
<b>🛠️ Training / workshops</b><br>&nbsp;&nbsp;• "Show training registrations"<br>&nbsp;&nbsp;• "who is in session 1 / session 2"<br><br>
<b>🎁 VIP bags</b><br>&nbsp;&nbsp;• "Who has VIP bags?"<br><br>
<b>📊 Stats &amp; breakdown</b><br>&nbsp;&nbsp;• "Give me a breakdown by account type"<br>&nbsp;&nbsp;• "how many attendees total?"<br><br>
<b>🏢 Celona team</b><br>&nbsp;&nbsp;• "Show Celona team" / "internal team"<br><br>
<b>📌 PAC members</b><br>&nbsp;&nbsp;• "Who are the PAC members?"<br><br>
<b>🔍 Free search</b><br>&nbsp;&nbsp;• Any name, company, or email — e.g. "Google", "Jason", "marathon"`;

  // ── Speakers ──
  }else if(q.includes('speaker')){
    const spk=attendees.filter(r=>r['Speakers']);
    a=`<b>${spk.length} speakers</b> (${spk.filter(r=>r['Speakers']==='Y').length} confirmed, ${spk.filter(r=>r['Speakers']==='TBD').length} TBD):<br><br>`;
    a+=fmt(spk,r=>`<b>${r['Name']}</b> (${r['Company']})${r['Speaker topic']?' — '+r['Speaker topic']:''}${r['Speakers']==='TBD'?' <span style="color:var(--muted)">[TBD]</span>':''}`);

  // ── Hotel ──
  }else if(q.includes('hotel')||q.includes('stay')||q.includes('hayes')){
    // optional: filter by name
    const nameHint=q.replace(/hotel|stay|staying|hayes|who|is|at|the/g,'').trim();
    let rows=hotel;
    if(nameHint.length>1) rows=hotel.filter(r=>(r['Name']||'').toLowerCase().includes(nameHint)||(r['Company']||'').toLowerCase().includes(nameHint));
    a=`<b>${rows.length} hotel reservation${rows.length!==1?'s':''}</b> at Hayes Mansion:<br><br>`;
    a+=fmt(rows,r=>`<b>${r['Name']}</b> (${r['Company']}) — In: ${r['Check-In']||'?'}, Out: ${r['Checkout']||'?'} · ${r['Reservation Status']||''}`);

  // ── Sponsors ──
  }else if(q.includes('sponsor')){
    a=`<b>${sponsors.length} sponsors:</b><br><br>`;
    a+=fmt(sponsors,r=>`<b>${r['Company']}</b> — ${r['Sponsorship level']||''} | ${r['Key Contact name']||''} (${r['Key Contact email ']||''})`);

  // ── CAB ──
  }else if(q.includes('cab')){
    const cab=attendees.filter(r=>isYes(r,'CAB'));
    a=`<b>CAB Members (${cab.length}):</b><br><br>`+fmt(cab,r=>`<b>${r['Name']}</b> (${r['Company']})`);

  // ── PAC ──
  }else if(q.includes('pac')){
    const pac=attendees.filter(r=>isYes(r,'PAC'));
    a=`<b>PAC Members (${pac.length}):</b><br><br>`+fmt(pac,r=>`<b>${r['Name']}</b> (${r['Company']})`);

  // ── Companies ──
  }else if(q.includes('compan')){
    let pool=attendees;
    // optional: filter by account type
    const typeHint=q.replace(/compan(ies|y)?|which|are|attending|show|list|from|all/g,'').trim();
    if(typeHint.length>1) pool=attendees.filter(r=>(r['Account Record Type']||'').toLowerCase().includes(typeHint));
    const types={};
    pool.forEach(r=>{
      const c=r['Company']||'Unknown';
      const t=r['Account Record Type']||'Unknown';
      if(!types[c]) types[c]={count:0,type:t};
      types[c].count++;
    });
    const sorted=Object.entries(types).sort((a,b)=>a[0].localeCompare(b[0]));
    a=`<b>${sorted.length} companies</b>${typeHint.length>1?' matching "'+typeHint+'"':''} (${pool.length} attendees total):<br><br>`;
    a+=sorted.map(([co,info])=>`• <b>${co}</b> <span style="color:var(--muted)">(${info.count} person${info.count!==1?'s':''} · ${info.type})</span>`).join('<br>');

  // ── Account owners ──
  }else if(q.includes('account owner')||q.includes('who owns')||q.includes('owner for')||q.includes('owners')){
    // optional: filter by name or company
    const hint=q.replace(/account|owner(s)?|who|owns?|for|show|list|all|the/g,'').trim();
    let pool=attendees;
    if(hint.length>1) pool=attendees.filter(r=>
      (r['Name']||'').toLowerCase().includes(hint)||
      (r['Company']||'').toLowerCase().includes(hint)
    );
    if(hint.length>1 && pool.length===0){
      a=`No attendees found matching "<b>${hint}</b>".`;
    } else if(hint.length>1){
      a=`<b>Account owner info for "${hint}" (${pool.length} result${pool.length!==1?'s':''}):</b><br><br>`;
      a+=fmt(pool,r=>`<b>${r['Name']}</b> (${r['Company']}) — Owner: <b>${r['Account owner']||'N/A'}</b>${r['CC Emails']?' · CC: '+r['CC Emails']:''}`);
    } else {
      // summary: owners and their accounts
      const ownerMap={};
      attendees.forEach(r=>{
        const o=r['Account owner']||'Unassigned';
        if(!ownerMap[o]) ownerMap[o]=[];
        ownerMap[o].push(r['Company']||r['Name']);
      });
      const sorted=Object.entries(ownerMap).sort((a,b)=>b[1].length-a[1].length);
      a=`<b>Account owners (${sorted.length} owners across ${attendees.length} attendees):</b><br><br>`;
      a+=sorted.map(([o,cos])=>{
        const unique=[...new Set(cos)];
        return `• <b>${o}</b> — ${unique.length} account${unique.length!==1?'s':''}: <span style="color:var(--muted)">${unique.slice(0,4).join(', ')}${unique.length>4?' +' +(unique.length-4)+' more':''}</span>`;
      }).join('<br>');
      a+=`<br><br><span style="color:var(--muted);font-size:12px">Tip: ask "account owner for [name or company]" to look up a specific person.</span>`;
    }

  // ── Confirmed attendees ──
  }else if(q.includes('confirm')||q.includes('rsvp')||(q.includes('attending')&&!q.includes('compan'))){
    const hint=q.replace(/confirm(ed)?|rsvp|attending|who|has|attendance|show|list/g,'').trim();
    let conf=attendees.filter(r=>r['Frequency 2026 - Attendance Confirmation']&&r['Frequency 2026 - Attendance Confirmation'].toLowerCase().includes('yes'));
    if(hint.length>1) conf=conf.filter(r=>(r['Company']||'').toLowerCase().includes(hint)||(r['Name']||'').toLowerCase().includes(hint));
    a=`<b>${conf.length} confirmed</b>${hint.length>1?' from "'+hint+'"':' out of '+attendees.length+' total ('+( attendees.length-attendees.filter(r=>r['Frequency 2026 - Attendance Confirmation']&&r['Frequency 2026 - Attendance Confirmation'].toLowerCase().includes('yes')).length)+' pending)'}:<br><br>`;
    a+=fmt(conf,r=>`${r['Name']} (${r['Company']})`);

  // ── VIP bags ──
  }else if(q.includes('vip')||q.includes('bag')){
    const vip=attendees.filter(r=>isYes(r,'VIP Bags'));
    a=`<b>${vip.length} VIP bag recipients:</b><br><br>`+fmt(vip,r=>`${r['Name']} (${r['Company']})`);

  // ── Food preferences ──
  }else if(q.includes('food')||q.includes('meal')||q.includes('diet')||q.includes('chicken')||q.includes('beef')||q.includes('vegetar')||q.includes('vegan')||q.includes('prefer')){
    const hint=q.replace(/food|preference(s)?|meal|diet|show|what|are|the/g,'').trim();
    const wf=attendees.filter(r=>r['Food Preference']);
    if(hint.length>1){
      // who specifically wants X
      const matched=wf.filter(r=>(r['Food Preference']||'').toLowerCase().includes(hint));
      a=`<b>${matched.length} people prefer "${hint}":</b><br><br>`+fmt(matched,r=>`${r['Name']} (${r['Company']}) — ${r['Food Preference']}`);
    } else {
      const counts={};wf.forEach(r=>{const f=r['Food Preference'];counts[f]=(counts[f]||0)+1;});
      a=`<b>Food preferences (${wf.length} responses):</b><br><br>`;
      Object.entries(counts).sort((x,y)=>y[1]-x[1]).forEach(([f,c])=>{a+=`• ${f}: <b>${c}</b><br>`;});
      a+=`<br>No preference / unspecified: <b>${attendees.length-wf.length}</b>`;
    }

  // ── Cancelled ──
  }else if(q.includes('cancel')||q.includes('withdrew')||q.includes('withdrawn')){
    a=`<b>${cancelled.length} cancelled/withdrawn:</b><br><br>`+fmt(cancelled,r=>`${r['Name']} (${r['Company']})`);

  // ── Training ──
  }else if(q.includes('training')||q.includes('session')||q.includes('workshop')||q.includes('hands-on')||q.includes('hands on')){
    const hint=q.includes('session 1')||q.includes('session1')?'Session 1':q.includes('session 2')||q.includes('session2')?'Session 2':null;
    let rows=hint?training.filter(r=>r['Session']===hint):training;
    a=`<b>Training registrations${hint?' — '+hint:''} (${rows.length} total${!hint?': S1='+training.filter(r=>r['Session']==='Session 1').length+', S2='+training.filter(r=>r['Session']==='Session 2').length:''}):</b><br><br>`;
    a+=fmt(rows,r=>`${r['Name']} (${r['Company']}) — ${r['Session']}`);

  // ── Breakdown / stats ──
  }else if(q.includes('breakdown')||q.includes('how many')||q.includes('count')||q.includes('total')||q.includes('stat')||q.includes('summary')){
    const types={};attendees.forEach(r=>{const t=r['Account Record Type']||'Unknown';types[t]=(types[t]||0)+1;});
    a=`<b>Attendee breakdown (${attendees.length} total):</b><br><br>`;
    Object.entries(types).sort((x,y)=>y[1]-x[1]).forEach(([t,c])=>{a+=`• ${t}: <b>${c}</b><br>`;});
    const conf=attendees.filter(r=>r['Frequency 2026 - Attendance Confirmation']&&r['Frequency 2026 - Attendance Confirmation'].toLowerCase().includes('yes')).length;
    const vip=attendees.filter(r=>isYes(r,'VIP Bags')).length;
    const cab=attendees.filter(r=>isYes(r,'CAB')).length;
    a+=`<br>✅ Confirmed: <b>${conf}</b> &nbsp;|&nbsp; ⏳ Pending: <b>${attendees.length-conf}</b><br>`;
    a+=`⭐ CAB: <b>${cab}</b> &nbsp;|&nbsp; 🎁 VIP Bags: <b>${vip}</b> &nbsp;|&nbsp; 🏨 Hotel: <b>${hotel.length}</b>`;

  // ── Celona / internal team ──
  }else if(q.includes('celona')||q.includes('team')||q.includes('internal')||q.includes('employee')){
    a=`<b>Celona team (${celona.length}):</b><br><br>`+celona.map(r=>`• <b>${r['Rajeev Shah']}</b> (${r['rajeev@celona.io']||''})`).join('<br>');

  // ── Free search ──
  }else{
    const words=q.split(/\s+/).filter(w=>w.length>2);
    const found=[...attendees,...cancelled].filter(r=>
      words.some(qw=>Object.values(r).filter(Boolean).join(' ').toLowerCase().includes(qw))
    );
    if(found.length){
      a=`<b>${found.length} result${found.length!==1?'s':''} for "${query}":</b><br><br>`;
      a+=fmt(found,r=>`<b>${r['Name']}</b> (${r['Company']}) — ${r['Account Record Type']||''} · Owner: ${r['Account owner']||'N/A'}`);
    }else{
      a=`I couldn't find anything for <b>"${query}"</b>.<br><br>Ask <b>"show help"</b> to see all available queries, or try a name, company, or email.`;
    }
  }
  return a;
}

function timeStr(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

function addUserMsg(text){
  const wrap=document.getElementById('chatWrap');
  wrap.innerHTML+=`<div class="msg user"><div class="bubble">${text}</div><div class="msg-time">${timeStr()}</div></div>`;
  wrap.scrollTop=wrap.scrollHeight;
}

function addBotMsg(html){
  const wrap=document.getElementById('chatWrap');
  wrap.innerHTML+=`<div class="msg bot"><div class="bubble">${html}</div><div class="msg-time">${timeStr()}</div></div>`;
  wrap.scrollTop=wrap.scrollHeight;
}

function showTyping(){
  const wrap=document.getElementById('chatWrap');
  wrap.innerHTML+=`<div class="msg bot" id="typing"><div class="bubble"><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div></div>`;
  wrap.scrollTop=wrap.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function sendMsg(){
  const input=document.getElementById('chatInput');
  const q=input.value.trim();
  if(!q)return;
  input.value='';
  document.getElementById('sendBtn').disabled=true;
  addUserMsg(q);
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addBotMsg(answer(q));
    document.getElementById('sendBtn').disabled=false;
    document.getElementById('chatInput').focus();
  },400+Math.random()*300);
}

function ask(q){
  document.getElementById('chatInput').value=q;
  sendMsg();
}
</script>
